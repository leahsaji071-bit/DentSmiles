<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Appointment - DentSmiles</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f1f6;
      color: #333;
      padding: 40px 20px;
      text-align: center;
    }
    .container {
      max-width: 400px;
      margin: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h2 {
      color: #5961a7;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      text-align: left;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
    }
    button {
      margin-top: 20px;
      background-color: #98a8f8;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #7d8bd8;
    }
    a {
      display: inline-block;
      margin-top: 15px;
      color: #5961a7;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Book Your Appointment</h2>

    <form action="success.html" method="GET">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required />

      <label for="date">Preferred Date</label>
      <input type="date" id="date" name="date" required />

      <label for="problem">Brief Description of Problem</label>
      <textarea id="problem" name="problem" rows="4" placeholder="Tell us about your dental issue" required></textarea>

      <button type="submit">Book Appointment</button>
    </form>

    <a href="index.html">← Back to Home</a>
  </div>

</body>
</html>
