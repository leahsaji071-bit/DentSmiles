    # Runs at 09:00 UTC (2:30 PM IST) every Monday and Thursday
    - cron: '0 9 * * 1,4'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Database REST API
        run: |
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            -H "apikey: sb_publishable_SsqaQ3koCDzPN-2jT2jq0Q_9DPE_maL" \
            "https://qtqqhdyvhizenwdzihws.supabase.co/rest/v1/appointments?select=id&limit=1"
