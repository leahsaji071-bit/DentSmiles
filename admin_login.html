<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - DentSmiles</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f3f1f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }
    h2 {
      color: #5961a7;
      margin-bottom: 20px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background: #98a8f8;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #7d8bd8;
    }
    .error {
      color: red;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Admin Login</h2>

    <form id="loginForm">
      <input type="password" id="password" placeholder="Enter password" required />
      <div class="error" id="errorMsg" style="display:none;">Incorrect password</div>
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      // Hardcoded password: dentadmin123
      if (pass === 'dentadmin123') {
        window.location.href = 'admindashboard.html';
      } else {
        errorMsg.style.display = 'block';
      }
    });
  </script>

</body>
</html>
